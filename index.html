<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2a24" />
  <title>マーケ実践コックピット</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f2ea;
      --panel: #fffdf7;
      --ink: #1d2521;
      --muted: #66716b;
      --line: #ded7c8;
      --deep: #1f2a24;
      --green: #2f6f5e;
      --blue: #335f8f;
      --amber: #b7792d;
      --rose: #b65656;
      --shadow: 0 18px 42px rgba(36, 34, 28, .14);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
    body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
    button, input, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(245, 242, 234, .92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(222, 215, 200, .8);
      padding: 14px 16px 10px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 5.8vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .progress-ring {
      width: 58px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--green) var(--angle), #e7e0d1 0);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .progress-ring span {
      width: 44px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--panel);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: var(--green);
    }

    .tabs {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .tab {
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, .74);
      color: var(--muted);
      border-radius: 8px;
      min-height: 42px;
      font-weight: 800;
      cursor: pointer;
    }
    .tab.active {
      background: var(--deep);
      color: #fff;
      border-color: var(--deep);
    }

    main {
      padding: 16px;
      display: grid;
      gap: 14px;
      flex: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-card {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .meta-row, .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
      background: #ebe5d7;
      color: #445047;
      border: 1px solid #d9d0bd;
    }
    .pill.green { background: #e4f0ea; color: #28634e; border-color: #c9ded4; }
    .pill.blue { background: #e3ebf4; color: #2f587f; border-color: #c9d9e8; }
    .pill.amber { background: #f2e6d4; color: #8f5c20; border-color: #e4ca9f; }

    h2 {
      margin: 0;
      font-size: clamp(24px, 6vw, 36px);
      line-height: 1.18;
      letter-spacing: 0;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 16px;
      letter-spacing: 0;
    }
    p { margin: 0; line-height: 1.75; }
    .lead { color: #38443e; font-size: 15px; }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .info-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #fffaf0;
      min-height: 136px;
    }
    .info-box p, .info-box li { color: #3f4b45; font-size: 14px; }
    .info-box ul { margin: 0; padding-left: 19px; line-height: 1.7; }

    .practice {
      border: 1px solid #bfd7cb;
      background: #edf7f2;
      padding: 14px;
      border-radius: 8px;
    }
    .practice h3 { color: var(--green); }

    textarea, input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 12px;
      outline: none;
    }
    textarea { min-height: 130px; resize: vertical; line-height: 1.7; }
    textarea:focus, input[type="search"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 111, 94, .15);
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .action-btn, .small-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      min-height: 44px;
      font-weight: 900;
      cursor: pointer;
    }
    .action-btn.done { background: var(--green); color: #fff; border-color: var(--green); }
    .action-btn.hold { background: var(--amber); color: #fff; border-color: var(--amber); }
    .action-btn.later { background: var(--blue); color: #fff; border-color: var(--blue); }
    .small-btn { min-height: 38px; padding: 0 12px; }

    .nav-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .nav-btn {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      background: var(--deep);
    }
    .nav-btn.secondary { background: #6b6a61; }

    .lesson-list {
      display: grid;
      gap: 10px;
    }
    .lesson-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 13px;
      display: grid;
      gap: 7px;
      cursor: pointer;
    }
    .lesson-item.active { border-color: var(--green); box-shadow: 0 0 0 3px rgba(47, 111, 94, .15); }
    .lesson-title { font-weight: 900; line-height: 1.45; }
    .lesson-summary { color: var(--muted); font-size: 13px; line-height: 1.6; }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #c9c2b4;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.done { background: var(--green); }
    .status-dot.hold { background: var(--amber); }
    .status-dot.later { background: var(--blue); }

    .hidden { display: none !important; }
    .empty {
      color: var(--muted);
      padding: 22px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.45);
    }

    footer {
      padding: 0 16px 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      header { padding-left: 12px; padding-right: 12px; }
      main { padding: 12px; }
      .section-grid { grid-template-columns: 1fr; }
      .tabs { gap: 6px; }
      .tab { font-size: 13px; }
      .action-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-row">
        <div>
          <h1>マーケ実践コックピット</h1>
          <p class="subtitle">STEP1根っこから、リストマーケまで。読む教材を「今日の1実践」に変える自分用アプリ。</p>
        </div>
        <div class="progress-ring" id="progressRing" style="--angle:0deg"><span id="progressText">0%</span></div>
      </div>
      <nav class="tabs" aria-label="表示切り替え">
        <button class="tab active" data-tab="today">今日</button>
        <button class="tab" data-tab="lessons">一覧</button>
        <button class="tab" data-tab="search">検索</button>
        <button class="tab" data-tab="log">ログ</button>
      </nav>
    </header>

    <main>
      <section id="todayView" class="view">
        <article class="panel hero-card" id="lessonCard"></article>
      </section>

      <section id="lessonsView" class="view hidden">
        <div class="panel hero-card">
          <h2>最初のセット</h2>
          <p class="lead">最初は「根っこ」から始めます。リストマーケはSTEP4。箱より先に、誰にどんな変化を届けるかを決める順番です。</p>
          <div class="lesson-list" id="lessonList"></div>
        </div>
      </section>

      <section id="searchView" class="view hidden">
        <div class="panel hero-card">
          <h2>検索</h2>
          <input type="search" id="searchInput" placeholder="例: LINE / note / 購入者 / PD-Helper / 嫌な未来" />
          <div class="lesson-list" id="searchResults"></div>
        </div>
      </section>

      <section id="logView" class="view hidden">
        <div class="panel hero-card">
          <div class="meta-row">
            <h2 style="flex:1">実践ログ</h2>
            <button class="small-btn" id="exportBtn">JSON保存</button>
          </div>
          <p class="lead">完了・保留・あとでにしたカードと、メモをここで見返します。</p>
          <div class="lesson-list" id="logList"></div>
        </div>
      </section>
    </main>

    <footer>
      このアプリは個人学習用です。教材本文の転載ではなく、保存済みナレッジを要約・実践化したカードとして扱います。外部投稿、LINE/メルマガ送信、決済リンク設置は人間確認。
    </footer>
  </div>

  <script>
    const lessons = [
      {
        id: 1,

        source: "明鏡由来パターン / コピー4ステップ",
        summary: [

        example: "PD-Helperなら「腹膜透析の記録を毎日つけたいのに、紙とスマホと記憶がバラバラになる」が入口。",
        practice: "PD-Helperを必要とする人が、夜または朝に困っている場面を1つ書く。",
        prompt: "誰が、いつ、何に困っている？その時の独り言は？",

      {

        quiz: "無料読者と購入者に同じ案内をしてよい？",

    const storageKey = "ei_marketing_cockpit_v1";
    const state = loadState();
    let currentLessonId = state.currentLessonId || 1;
    let activeTab = "today";

    const tabButtons = document.querySelectorAll(".tab");
    const views = {
      today: document.getElementById("todayView"),
      lessons: document.getElementById("lessonsView"),
      search: document.getElementById("searchView"),
      log: document.getElementById("logView")
    };

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    document.getElementById("searchInput").addEventListener("input", renderSearch);
    document.getElementById("exportBtn").addEventListener("click", exportState);

    renderAll();

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || { notes: {}, status: {}, currentLessonId: 1 };
      } catch {
        return { notes: {}, status: {}, currentLessonId: 1 };
      }
    }

    function saveState() {
      state.currentLessonId = currentLessonId;
      localStorage.setItem(storageKey, JSON.stringify(state));
      renderProgress();
    }

    function setTab(tab) {
      activeTab = tab;
      tabButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
      Object.entries(views).forEach(([key, el]) => el.classList.toggle("hidden", key !== tab));
      if (tab === "lessons") renderLessonList();
      if (tab === "search") renderSearch();
      if (tab === "log") renderLog();
    }

    function renderAll() {
      renderLessonCard();
      renderLessonList();
      renderSearch();
      renderLog();
      renderProgress();
    }

    function getLesson(id) {
      return lessons.find(lesson => lesson.id === Number(id)) || lessons[0];
    }

    function renderLessonCard() {
      const lesson = getLesson(currentLessonId);
      const status = state.status[lesson.id] || "";
      const note = state.notes[lesson.id] || "";
      const card = document.getElementById("lessonCard");
      card.innerHTML = `
        <div class="meta-row">
          <span class="pill green">${lesson.phase}</span>
          <span class="pill blue">Day ${lesson.id} / ${lessons.length}</span>
          <span class="pill amber">${statusLabel(status)}</span>
        </div>
        <h2>${escapeHtml(lesson.title)}</h2>
        <p class="lead">${escapeHtml(lesson.source)}</p>
        <div class="section-grid">
          <div class="info-box">
            <h3>3行要約</h3>
            <ul>${lesson.summary.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </div>
          <div class="info-box">
            <h3>えいちゃんへの適用</h3>
            <p>${escapeHtml(lesson.example)}</p>
          </div>
        </div>
        <div class="practice">
          <h3>今日の実践</h3>
          <p>${escapeHtml(lesson.practice)}</p>
        </div>
        <div class="info-box">
          <h3>問い</h3>
          <p>${escapeHtml(lesson.prompt)}</p>
        </div>
        <label>
          <h3>実践メモ</h3>
          <textarea id="memoBox" placeholder="ここに今日の答えを書く">${escapeHtml(note)}</textarea>
        </label>
        <div class="info-box">
          <h3>思い出しクイズ</h3>
          <p>${escapeHtml(lesson.quiz)}</p>
        </div>
        <div class="tag-row">
          ${lesson.tags.map(tag => `<span class="pill">${escapeHtml(tag)}</span>`).join("")}
        </div>
        <div class="action-row">
          <button class="action-btn done" data-status="done">やった</button>
          <button class="action-btn hold" data-status="hold">保留</button>
          <button class="action-btn later" data-status="later">あとで</button>
        </div>
        <div class="nav-row">
          <button class="nav-btn secondary" id="prevBtn">前へ</button>
          <button class="nav-btn" id="nextBtn">次へ</button>
        </div>
      `;
      document.getElementById("memoBox").addEventListener("input", (event) => {
        state.notes[lesson.id] = event.target.value;
        saveState();
      });
      card.querySelectorAll(".action-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.status[lesson.id] = btn.dataset.status;
          saveState();
          renderLessonCard();
          renderLessonList();
          renderLog();
        });
      });
      document.getElementById("prevBtn").addEventListener("click", () => moveLesson(-1));
      document.getElementById("nextBtn").addEventListener("click", () => moveLesson(1));
    }

    function moveLesson(delta) {
      const next = currentLessonId + delta;
      currentLessonId = Math.min(lessons.length, Math.max(1, next));
      saveState();
      renderLessonCard();
      renderLessonList();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderLessonList() {
      const list = document.getElementById("lessonList");
      list.innerHTML = lessons.map(lesson => lessonButton(lesson)).join("");
      list.querySelectorAll(".lesson-item").forEach(btn => {
        btn.addEventListener("click", () => selectLesson(btn.dataset.id));
      });
    }

    function renderSearch() {
      const input = document.getElementById("searchInput");
      const q = (input.value || "").trim().toLowerCase();
      const results = document.getElementById("searchResults");
      const filtered = q
        ? lessons.filter(lesson => JSON.stringify(lesson).toLowerCase().includes(q))
        : lessons;
      results.innerHTML = filtered.length
        ? filtered.map(lesson => lessonButton(lesson)).join("")
        : `<div class="empty">該当するカードがありません。</div>`;
      results.querySelectorAll(".lesson-item").forEach(btn => {
        btn.addEventListener("click", () => selectLesson(btn.dataset.id));
      });
    }

    function renderLog() {
      const logList = document.getElementById("logList");
      const logged = lessons.filter(lesson => state.status[lesson.id] || state.notes[lesson.id]);
      logList.innerHTML = logged.length
        ? logged.map(lesson => {
          const status = state.status[lesson.id] || "";
          const note = state.notes[lesson.id] || "メモなし";
          return `
            <button class="lesson-item" data-id="${lesson.id}">
              <div class="lesson-title"><span class="status-dot ${status}"></span>Day ${lesson.id}: ${escapeHtml(lesson.title)}</div>
              <div class="lesson-summary">${escapeHtml(statusLabel(status))}</div>
              <div class="lesson-summary">${escapeHtml(note).replace(/\n/g, "<br>")}</div>
            </button>
          `;
        }).join("")
        : `<div class="empty">まだ実践ログはありません。今日のカードにメモを書くとここに残ります。</div>`;
      logList.querySelectorAll(".lesson-item").forEach(btn => {
        btn.addEventListener("click", () => selectLesson(btn.dataset.id));
      });
    }

    function renderProgress() {
      const doneCount = lessons.filter(lesson => state.status[lesson.id] === "done").length;
      const percent = Math.round((doneCount / lessons.length) * 100);
      document.getElementById("progressRing").style.setProperty("--angle", `${percent * 3.6}deg`);
      document.getElementById("progressText").textContent = `${percent}%`;
    }

    function lessonButton(lesson) {
      const status = state.status[lesson.id] || "";
      return `
        <button class="lesson-item ${lesson.id === currentLessonId ? "active" : ""}" data-id="${lesson.id}">
          <div class="meta-row">
            <span class="pill green">${escapeHtml(lesson.phase)}</span>
            <span class="pill blue">Day ${lesson.id}</span>
          </div>
          <div class="lesson-title"><span class="status-dot ${status}"></span>${escapeHtml(lesson.title)}</div>
          <div class="lesson-summary">${escapeHtml(lesson.summary[0])}</div>
        </button>
      `;
    }

    function selectLesson(id) {
      currentLessonId = Number(id);
      saveState();
      renderLessonCard();
      renderLessonList();
      setTab("today");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function statusLabel(status) {
      if (status === "done") return "完了";
      if (status === "hold") return "保留";
      if (status === "later") return "あとで";
      return "未着手";
    }

    function exportState() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "マーケ実践コックピット",
        lessons: lessons.map(lesson => ({
          id: lesson.id,
          title: lesson.title,
          status: state.status[lesson.id] || "",
          note: state.notes[lesson.id] || ""
        }))
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "marketing-cockpit-log.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
